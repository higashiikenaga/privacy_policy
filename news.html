    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yukiecho.com - newsslide</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }
        .news-item {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }
        .news-item:last-child {
            border-bottom: none;
        }
        .news-item h2 {
            margin: 0 0 8px 0;
            font-size: 1.4em;
        }
        .news-item h2 a {
            text-decoration: none;
            color: #007bff;
        }
        .news-item h2 a:hover {
            text-decoration: underline;
        }
        .news-item p.description {
            margin: 0 0 8px 0;
            font-size: 0.95em;
            color: #555;
        }
        .news-item p.date {
            font-size: 0.8em;
            color: #777;
            margin: 0;
        }
        .loading, .error {
            text-align: center;
            padding: 20px;
            font-size: 1.1em;
            color: #777;
        }
        .summary-section {
            margin-top: 10px;
            padding: 10px;
            background-color: #f9f9f9;
            border-left: 3px solid #007bff;
            font-size: 0.9em;
        }
        .summary-loading, .summary-error {
            font-style: italic;
            color: #777;
        }
        /* 横スライド用スタイル */
        .news-feed-slider {
            display: flex;
            overflow-x: auto; /* 横スクロールを可能にする */
            padding-bottom: 15px; /* スクロールバーのためのスペース */
            -webkit-overflow-scrolling: touch; /* iOSでの慣性スクロール */
            /* scroll-snap-type: x mandatory; */ /* 好みに応じてスナップスクロールを有効化 */
        }
        .news-feed-slider .news-item {
            flex: 0 0 auto; /* アイテムが縮まないように、また伸びないように */
            width: 300px; /* 各ニュースアイテムの幅 */
            margin-right: 15px;
            border-bottom: none; /* 横並びなので下線は不要 */
            border-right: 1px solid #eee; /* 右側に区切り線 */
            padding: 15px; /* パディングをアイテム自体に適用 */
            box-sizing: border-box; /* パディングとボーダーを幅に含める */
            /* scroll-snap-align: start; */ /* スナップスクロール使用時 */
        }
        .news-feed-slider .news-item:last-child {
            border-right: none;
            margin-right: 0;
        }

        /* EEWテロップ用のCSS */
        #eew-ticker-container {
            position: fixed; /* 画面に固定 */
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 0, 0, 0.8); /* 赤色の半透明背景 */
            color: white;
            padding: 5px 0;
            font-size: 1.2em;
            font-weight: bold;
            overflow: hidden; /* テキストがコンテナからはみ出すように */
            white-space: nowrap; /* テキストを折り返さない */
            z-index: 1000; /* 他の要素より手前に表示 */
            display: none; /* 初期状態では非表示 */
            text-align: center; /* 中央寄せ */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #eew-ticker-text {
            display: inline-block; /* アニメーションのために必須 */
            padding-left: 100%; /* 最初は画面外から開始 */
            animation: ticker-scroll 20s linear infinite; /* アニメーション設定 */
            /* pausedクラスが追加されたらアニメーションを一時停止 */
            animation-play-state: running; 
        }

        #eew-ticker-text.paused {
            animation-play-state: paused;
        }


        @keyframes ticker-scroll {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-100%); } /* 左にスクロール */
        }

        /* アラートの種類に応じた色分け (オプション) */
        .eew-alert-warning { background-color: rgba(255, 0, 0, 0.9); } /* 警報 */
        .eew-alert-forecast { background-color: rgba(255, 165, 0, 0.9); } /* 予報 */
        .eew-alert-cancel { background-color: rgba(0, 0, 255, 0.8); } /* 解除/取消 */

    </style>
</head>

<body>
    <div id="eew-ticker-container">
        <span id="eew-ticker-text"></span>
    </div>

    <div class="container">
        <h1>最新ニュース</h1>
        <div class="global-summary-controls" style="margin-bottom: 20px;">
            <button id="summarize-all-button" style="padding: 8px 15px; font-size: 1em; display: none;">今日のニュースをまとめて聞く (AI)</button>
            <div id="global-summary-output" class="summary-section" style="display: none; margin-top: 15px;"></div>
            <div id="tts-controls" style="margin-top: 10px; display: none;">
                <audio id="tts-audio-player" controls></audio>
                <p id="tts-status" class="summary-loading" style="font-size: 0.9em; margin-top: 5px;"></p>
            </div>
        </div>
        <div id="news-feed" class="news-feed-slider"> {/* クラス追加 */}
            <p class="loading">ニュースを読み込んでいます...</p>
        </div>
        <li style="margin-top: 20px;"><a href="index.html">トップページ</a></li>
    </div>

    <script src="config.js"></script> <script type="module">
        // Google AI JavaScript SDK のインポート
        import { GoogleGenerativeAI, HarmCategory, HarmBlockThreshold } from "https://esm.run/@google/generative-ai";

        const MAX_NEWS_ITEMS_TOTAL = 20; // 全フィード合わせて表示する最大件数
        const EFFECTIVE_GEMINI_API_KEY = window.APP_CONFIG && window.APP_CONFIG.GEMINI_API_KEY;

        const rssFeeds = [
            { name: "NHK 主要ニュース", url: "https://www.nhk.or.jp/rss/news/cat0.xml" },
            { name: "BBC World News", url: "http://feeds.bbci.co.uk/news/world/rss.xml" },
            { name: "Bloomberg Markets", url: "https://feeds.bloomberg.com/markets/news.rss" }
            // 他のフィードも追加可能
        ];

        const newsFeedContainer = document.getElementById('news-feed');
        let genAI;
        let model;
        let currentNewsItemsForSummary = []; // 表示中のニュースデータを保持
        const ttsControlsDiv = document.getElementById('tts-controls');
        const ttsAudioPlayer = document.getElementById('tts-audio-player');
        const ttsStatusElement = document.getElementById('tts-status');

        if (EFFECTIVE_GEMINI_API_KEY && EFFECTIVE_GEMINI_API_KEY !== "YOUR_GEMINI_API_KEY_PLACEHOLDER") { // Placeholder check
            console.log("Gemini API Key found. Initializing Gemini model...");
            try {
                genAI = new GoogleGenerativeAI(EFFECTIVE_GEMINI_API_KEY);
                model = genAI.getGenerativeModel({ model: "gemini-1.5-flash-latest" });
                console.log("Gemini model initialized successfully.");
                document.getElementById('summarize-all-button').style.display = 'block'; // APIキーがあればボタン表示
            } catch (error) {
                console.error("Failed to initialize Gemini model:", formatErrorDetail(error.message || error));
                model = null; // Ensure model is null if initialization fails
            }
        } else {
            document.getElementById('summarize-all-button').style.display = 'none'; // APIキーがなければボタン非表示
            console.warn("Gemini API Key not found or is a placeholder. Summarization feature will be disabled.");
            model = null; // Ensure model is null if key is missing
        }

        function formatErrorDetail(detail) {
            if (typeof detail === 'string') {
                return detail;
            }
            if (typeof detail === 'object' && detail !== null) {
                return JSON.stringify(detail);
            }
            return '不明なエラー詳細';
        }

        async function fetchFeed(feedConfig) {
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedConfig.url)}`;
            const response = await fetch(apiUrl);
            if (!response.ok) {
                let errorText = response.statusText;
                try {
                    const errorData = await response.json();
                    if (errorData && errorData.message) {
                        errorText = formatErrorDetail(errorData.message);
                    }
                } catch (e) { /* JSONパース失敗時は元のステータステキストを使用 */ }
                throw new Error(`HTTP error! status: ${response.status}, message: ${errorText} for ${feedConfig.name}`);
            }
            const data = await response.json();
            if (data && data.status === 'ok' && Array.isArray(data.items)) {
                return data.items.map(item => ({ ...item, sourceName: feedConfig.name, sourceUrl: feedConfig.url }));
            } else if (data && data.status === 'error' && data.message) {
                const errorDetail = data.message;
                throw new Error(`API error: ${formatErrorDetail(errorDetail)} for ${feedConfig.name}`);
            } else {
                throw new Error(`Invalid feed format for ${feedConfig.name}`);
            }
        }

        async function generateGlobalSummary() {
            const summaryOutputContainer = document.getElementById('global-summary-output');
            summaryOutputContainer.style.display = 'block';
            ttsControlsDiv.style.display = 'none';
            ttsAudioPlayer.src = '';
            summaryOutputContainer.innerHTML = `<p class="summary-loading">ニュース全体の要約を生成中...</p>`;

            if (!model) {
                summaryOutputContainer.innerHTML = `<p class="summary-error">Gemini APIキーが設定されていないか、モデルの初期化に失敗しました。</p>`;
                return;
            }

            if (currentNewsItemsForSummary.length === 0) {
                summaryOutputContainer.innerHTML = `<p class="summary-error">要約対象のニュースがありません。</p>`;
                return;
            }

            let combinedNewsText = currentNewsItemsForSummary.map((item, index) => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = item.description;
                const plainDescription = (tempDiv.textContent || tempDiv.innerText || "").trim();
                return `ニュース ${index + 1}:\nタイトル: ${item.title}\n概要: ${plainDescription}\n出典: ${item.sourceName || '不明'}`;
            }).join("\n\n---\n\n");

            if (combinedNewsText.trim().length < 50) {
                summaryOutputContainer.innerHTML = `<p class="summary-error">要約するにはニュース全体の情報が少なすぎます。</p>`;
                return;
            }

            console.log("Attempting to generate global summary with Gemini. Combined text length:", combinedNewsText.length);

            try {
                const generationConfig = {
                    temperature: 0.7,
                    topK: 1,
                    topP: 1,
                    maxOutputTokens: 800,
                };
                const safetySettings = [
                    { category: HarmCategory.HARM_CATEGORY_HARASSMENT, threshold: HarmBlockThreshold.BLOCK_MEDIUM_AND_ABOVE, },
                    { category: HarmCategory.HARM_CATEGORY_HATE_SPEECH, threshold: HarmBlockThreshold.BLOCK_MEDIUM_AND_ABOVE, },
                    { category: HarmCategory.HARM_CATEGORY_SEXUALLY_EXPLICIT, threshold: HarmBlockThreshold.BLOCK_MEDIUM_AND_ABOVE, },
                    { category: HarmCategory.HARM_CATEGORY_DANGEROUS_CONTENT, threshold: HarmBlockThreshold.BLOCK_MEDIUM_AND_ABOVE, },
                ];

                const prompt = `あなたはプロのニュースキャスターです。以下の複数のニュース記事を元に、今日の主要な出来事を視聴者に伝える形で、まとめてレポートしてください。各ニュースの要点を簡潔に含め、自然な話し言葉で、重要な順に構成して話してください。\n\n[ニュース記事群ここから]\n${combinedNewsText}\n[ニュース記事群ここまで]`;
                const result = await model.generateContent({ contents: [{ role: "user", parts: [{text: prompt}] }], generationConfig, safetySettings });
                const summaryText = result.response.text();
                const summaryHtml = summaryText.replace(/\n/g, '<br>');
                summaryOutputContainer.innerHTML = `<p>${summaryHtml}</p>`;

                if (summaryText.trim()) {
                    speakSummary(summaryText.trim());
                }

            } catch (error) {
                summaryOutputContainer.innerHTML = `<p class="summary-error">ニュース全体の要約生成に失敗しました: ${formatErrorDetail(error.message || error)}</p>`;
                console.error("Gemini API Error for global summary:", error);
            }
        }

        async function speakSummary(textToSpeak) {
            // TTS_API_KEY は Cloudflare Worker の環境変数に設定されており、フロントエンドからは直接アクセスしません。
            // そのため、ここではAPIキーの存在チェックではなく、TTS機能が利用可能かどうかの確認をします。
            // (例えば、APIプロキシが設定されているか)
            // 実際には、Cloudflare Workerが適切にデプロイされていることを前提とします。

            ttsControlsDiv.style.display = 'block';
            ttsAudioPlayer.style.display = 'none';
            ttsStatusElement.textContent = '音声を生成中...';
            console.log("Attempting to synthesize speech for text (first 50 chars):", textToSpeak.substring(0, 50) + "...");

            const proxyApiUrl = `/api/tts`; // Cloudflare Functionのエンドポイント

            try {
                const response = await fetch(proxyApiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: textToSpeak }),
                });

                if (!response.ok) {
                    let errorDetail = '不明なプロキシエラー';
                    try {
                        const errorData = await response.json();
                        errorDetail = errorData.error || JSON.stringify(errorData);
                    } catch (e) { /* JSONパース失敗時はデフォルトメッセージ */ }
                    throw new Error(`プロキシTTSエラー: ${response.status} ${formatErrorDetail(errorDetail)}`);
                }

                const data = await response.json();
                if (data.error) {
                    throw new Error(`プロキシTTSエラー: ${formatErrorDetail(data.error)}`);
                }

                const audioContent = data.audioContent;
                if (!audioContent) {
                    throw new Error('プロキシから音声データが返されませんでした。');
                }
                ttsAudioPlayer.src = `data:audio/mp3;base64,${audioContent}`;
                ttsAudioPlayer.style.display = 'block';
                ttsStatusElement.textContent = '音声の準備ができました。';
                ttsAudioPlayer.play().catch(e => console.warn("Audio autoplay prevented:", e));
            } catch (error) {
                ttsStatusElement.textContent = `音声の生成に失敗しました: ${formatErrorDetail(error.message || error)}`;
                ttsAudioPlayer.style.display = 'none';
                console.error("Proxy TTS Call Error:", error);
            }
        }

        async function fetchAndDisplayNews() {
            newsFeedContainer.innerHTML = `<p class="loading">ニュースを読み込んでいます...</p>`;
            let allItems = [];

            const results = await Promise.allSettled(
                rssFeeds.map(feedConfig => fetchFeed(feedConfig))
            );

            results.forEach(result => {
                if (result.status === 'fulfilled' && result.value) {
                    allItems = allItems.concat(result.value);
                } else if (result.status === 'rejected') {
                    console.error(`フィード「${result.reason.message.includes("for ") ? result.reason.message.substring(result.reason.message.indexOf("for ") + 4) : "不明"}」の取得に失敗: ${result.reason}`);
                }
            });

            if (allItems.length === 0) {
                newsFeedContainer.innerHTML = `<p class="error">表示するニュースがありません。全てのフィードの読み込みに失敗したか、ニュースが空でした。</p>`;
                return;
            }

            allItems.sort((a, b) => {
                try {
                    const dateA = a.pubDate ? new Date(a.pubDate) : new Date(0);
                    const dateB = b.pubDate ? new Date(b.pubDate) : new Date(0);
                    return dateB - dateA;
                } catch (e) {
                    return 0;
                }
            });

            const itemsToRender = allItems.slice(0, MAX_NEWS_ITEMS_TOTAL);
            currentNewsItemsForSummary = itemsToRender.map(item => ({
                title: item.title,
                description: item.description,
                link: item.link,
                sourceName: item.sourceName
            }));
            renderNews(itemsToRender);
        }

        function renderNews(items) {
            if (!items || items.length === 0) {
                newsFeedContainer.innerHTML = "<p class='error'>表示するニュースがありません。</p>";
                return;
            }

            newsFeedContainer.innerHTML = '';

            items.forEach(item => {
                const newsItemDiv = document.createElement('div');
                newsItemDiv.classList.add('news-item');

                const titleElement = document.createElement('h2');
                const linkElement = document.createElement('a');
                linkElement.href = item.link;
                linkElement.textContent = item.title;
                linkElement.target = "_blank";
                linkElement.rel = "noopener noreferrer";
                titleElement.appendChild(linkElement);

                const descriptionElement = document.createElement('p');
                descriptionElement.classList.add('description');
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = item.description;
                let descriptionText = (tempDiv.textContent || tempDiv.innerText || "").trim();
                const MAX_DESC_LENGTH = 120;
                if (descriptionText.length > MAX_DESC_LENGTH) {
                    descriptionText = descriptionText.substring(0, MAX_DESC_LENGTH) + "...";
                }
                descriptionElement.textContent = descriptionText;

                const dateElement = document.createElement('p');
                dateElement.classList.add('date');
                try {
                    dateElement.textContent = item.pubDate ? `公開日: ${new Date(item.pubDate).toLocaleString('ja-JP', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}` : '公開日不明';
                } catch (e) {
                    dateElement.textContent = item.pubDate ? `公開日: ${item.pubDate}` : '公開日不明';
                }

                newsItemDiv.appendChild(titleElement);
                newsItemDiv.appendChild(descriptionElement);
                newsItemDiv.appendChild(dateElement);

                if (item.sourceName) {
                    const sourceElement = document.createElement('p');
                    sourceElement.classList.add('date');
                    sourceElement.style.fontSize = '0.75em';
                    sourceElement.style.color = '#888';
                    sourceElement.style.marginTop = '4px';
                    const sourceLink = document.createElement('a');
                    sourceLink.href = item.sourceUrl || '#';
                    sourceLink.textContent = item.sourceName;
                    sourceLink.target = "_blank"; sourceLink.rel = "noopener noreferrer";
                    sourceElement.appendChild(document.createTextNode('出典: '));
                    sourceElement.appendChild(sourceLink);
                    newsItemDiv.appendChild(sourceElement);
                }

                newsFeedContainer.appendChild(newsItemDiv);
            });
        }

        // ページ読み込み時にニュースを取得して表示
        fetchAndDisplayNews();

        // 全体要約ボタンのイベントリスナー
        const summarizeAllBtn = document.getElementById('summarize-all-button');
        summarizeAllBtn.addEventListener('click', generateGlobalSummary);


        // --- 緊急地震速報 (EEW) 機能 ---
const eewTickerContainer = document.getElementById('eew-ticker-container');
const eewTickerText = document.getElementById('eew-ticker-text');

const EEW_API_URL = 'https://api.wolfx.jp/jma_eew.json';
let lastEEWData = null; // 前回取得したEEWデータを保持（JSON文字列で比較するため）

/**
 * EEW情報を取得し、テロップを更新する
 */
async function fetchEEWData() {
    try {
        const response = await fetch(EEW_API_URL);
        if (!response.ok) {
            throw new Error(`EEW API call failed with status: ${response.status}`);
        }
        const currentEEWData = await response.json();

        // ★修正点1: currentEEWDataがオブジェクトとして返されることを前提とする
        // そして、有効なデータかどうかの最低限のチェックを行う
        if (!currentEEWData || typeof currentEEWData !== 'object' || !currentEEWData.Title) {
            console.log('EEW data is empty or invalid format.');
            eewTickerContainer.style.display = 'none'; // データがない場合は非表示
            eewTickerText.textContent = '';
            lastEEWData = null; // データがない場合はnullにリセット
            return;
        }

        // データが前回と異なる場合のみ処理
        // EventIDとSerialを組み合わせてユニークなIDとし、それが前回と異なるかを判断する
        const currentEventId = `${currentEEWData.EventID}-${currentEEWData.Serial}`;
        const lastEventId = lastEEWData ? `${lastEEWData.EventID}-${lastEEWData.Serial}` : null;

        if (currentEventId !== lastEventId) {
            console.log('New EEW data received:', currentEEWData);
            processEEWData(currentEEWData);
            lastEEWData = currentEEWData; // データを更新
        } else {
            console.log('EEW data unchanged.');
        }

    } catch (error) {
        console.error('Failed to fetch EEW data:', error);
        // エラー時はテロップを非表示にする
        eewTickerContainer.style.display = 'none';
        eewTickerText.textContent = '';
        lastEEWData = null; // エラー時もデータをリセット
    }
}

/**
 * EEWデータを処理し、テロップを表示または更新する
 * @param {object} eewData - 受信したEEWデータ（単一オブジェクト）
 */
function processEEWData(eewData) {
    // ★修正点2: データ構造に合わせたプロパティアクセスに変更
    if (!eewData || eewData.isCancel || eewData.isTraining) {
        console.log('EEW is cancelled or training data, or invalid. Hiding ticker.');
        eewTickerContainer.style.display = 'none';
        eewTickerText.textContent = '';
        return;
    }

    let message = '';
    let alertClass = '';

    // 'Title' プロパティや 'isWarn' を使用してEEWの種類を判断
    if (eewData.isWarn) { // isWarn が true の場合は警報
        const hypocenterName = eewData.Hypocenter || '不明';
        const depth = eewData.Depth ? `${eewData.Depth}km` : '不明';
        const magnitude = eewData.Magunitude || '不明'; // 注意: Magunitude (綴りがu)
        const maxIntensity = eewData.MaxIntensity || '不明';
        
        message = `【緊急地震速報 - 警報】震源地: ${hypocenterName}、深さ: 約${depth}、M: ${magnitude}。予測最大震度: ${maxIntensity}。`;
        alertClass = 'eew-alert-warning';
        // ★オプション: 音声読み上げをトリガーする
        // speakSummary(message);
        // 注意: EEWの音声は非常に重要なので、運用上の注意点を考慮してください。
    } else { // 警報ではない場合（予報、情報更新など）
        const hypocenterName = eewData.Hypocenter || '不明';
        const magnitude = eewData.Magunitude || '不明';

        message = `【緊急地震速報 - 予報】震源地: ${hypocenterName}、M: ${magnitude}。`;
        // より詳細な Title をメッセージに含めることも可能
        // message = `【緊急地震速報】${eewData.Title || '情報更新'}：震源地「${hypocenterName}」、M: ${magnitude}。`;
        alertClass = 'eew-alert-forecast';
    }

    // テロップの表示と内容更新
    eewTickerText.textContent = message;
    eewTickerContainer.className = ''; // クラスをリセット
    if (alertClass) {
        eewTickerContainer.classList.add(alertClass);
    }
    eewTickerContainer.style.display = 'block';

    // アニメーションのリセットと再開
    eewTickerText.style.animation = 'none';
    eewTickerText.offsetHeight; // リフローを強制
    eewTickerText.style.animation = null; // アニメーションを再開
}

// EEW情報のポーリングを開始
const EEW_POLLING_INTERVAL = 3000; // 3秒ごとにEEW情報をチェック (リアルタイム性重視)
setInterval(fetchEEWData, EEW_POLLING_INTERVAL);

// ページロード時に初回取得
fetchEEWData();

    </script>
