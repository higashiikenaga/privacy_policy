    <meta charset="UTF-8">

    <title>yukiecho.com - ニュース</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }
        .news-item {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }
        .news-item:last-child {
            border-bottom: none;
        }
        .news-item h2 {
            margin: 0 0 8px 0;
            font-size: 1.4em;
        }
        .news-item h2 a {
            text-decoration: none;
            color: #007bff;
        }
        .news-item h2 a:hover {
            text-decoration: underline;
        }
        .news-item p.description {
            margin: 0 0 8px 0;
            font-size: 0.95em;
            color: #555;
        }
        .news-item p.date {
            font-size: 0.8em;
            color: #777;
            margin: 0;
        }
        .loading, .error {
            text-align: center;
            padding: 20px;
            font-size: 1.1em;
            color: #777;
        }
        .summary-section {
            margin-top: 10px;
            padding: 10px;
            background-color: #f9f9f9;
            border-left: 3px solid #007bff;
            font-size: 0.9em;
        }
        .summary-loading, .summary-error {
            font-style: italic;
            color: #777;
        }
        /* 横スライド用スタイル */
        .news-feed-slider {
            display: flex;
            overflow-x: auto; /* 横スクロールを可能にする */
            padding-bottom: 15px; /* スクロールバーのためのスペース */
            -webkit-overflow-scrolling: touch; /* iOSでの慣性スクロール */
        }
        .news-feed-slider .news-item {
            flex: 0 0 auto; 
            width: 300px; 
            margin-right: 15px;
            border-bottom: none; 
            border-right: 1px solid #eee; 
            padding: 15px; 
            box-sizing: border-box; 
        }
        .news-feed-slider .news-item:last-child {
            border-right: none;
            margin-right: 0;
        }

        #eew-ticker-container {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 0, 0, 0.8); 
            color: white;
            padding: 5px 0;
            font-size: 1.2em;
            font-weight: bold;
            overflow: hidden; 
            white-space: nowrap; 
            z-index: 1000; 
            display: none; 
            text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #eew-ticker-text {
            display: inline-block; 
            padding-left: 100%; 
            animation: ticker-scroll 20s linear infinite; 
            animation-play-state: running; 
        }

        #eew-ticker-text.paused {
            animation-play-state: paused;
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-100%); } 
        }

        .eew-alert-warning { background-color: rgba(255, 0, 0, 0.9); } 
        .eew-alert-forecast { background-color: rgba(255, 165, 0, 0.9); } 
        .eew-alert-cancel { background-color: rgba(0, 0, 255, 0.8); } 

        #video-loading-indicator {
            color: #007bff;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

    <div class="container">
        <h1>最新ニュース</h1>
        <div class="global-summary-controls" style="margin-bottom: 20px;"> 
            <button id="summarize-all-button" style="padding: 8px 15px; font-size: 1em; display: none;">今日のニュースをまとめて聞く (AI)</button>
            <div id="global-summary-output" class="summary-section" style="display: none; margin-top: 15px;"></div>
            <div id="tts-controls" style="margin-top: 10px; display: none;">
                <p id="tts-status" class="summary-loading" style="font-size: 0.9em; margin-top: 5px;"></p>
            </div>
            <canvas id="newsCanvas" style="border: 1px solid black; display: none; margin-top: 15px; max-width: 100%;"></canvas>
            <button id="generateVideoButton" style="padding: 8px 15px; font-size: 1em; margin-top: 10px; display: none;">ニュース動画を生成 (β)</button>
            <p id="video-loading-indicator" style="display: none;">動画を生成しています。しばらくお待ちください...</p>
            <div id="video-output-area" style="margin-top: 15px;"></div>
        </div>
        <div id="news-feed" class="news-feed-slider">
            <p class="loading">ニュースを読み込んでいます...</p>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="news_video_generator.js"></script>
    <script type="module">
        import { GoogleGenerativeAI, HarmCategory, HarmBlockThreshold } from "https://esm.run/@google/generative-ai";

        const MAX_NEWS_ITEMS_TOTAL = 20;
        const EFFECTIVE_GEMINI_API_KEY = window.APP_CONFIG && window.APP_CONFIG.GEMINI_API_KEY;

        const rssFeeds = [
            { name: "NHK 主要ニュース", url: "https://www.nhk.or.jp/rss/news/cat0.xml" },
            { name: "BBC World News", url: "http://feeds.bbci.co.uk/news/world/rss.xml" },
            { name: "Bloomberg Markets", url: "https://feeds.bloomberg.com/markets/news.rss" }
        ];

        const newsFeedContainer = document.getElementById('news-feed');
        let genAI;
        let model;
        let currentNewsItemsForSummary = [];
        const ttsControlsDiv = document.getElementById('tts-controls');
        const generateVideoButton = document.getElementById('generateVideoButton');
        const newsCanvas = document.getElementById('newsCanvas');
        const videoOutputArea = document.getElementById('video-output-area');
        const ttsStatusElement = document.getElementById('tts-status');
        const videoLoadingIndicator = document.getElementById('video-loading-indicator'); // 読み込み中インジケータ

        if (EFFECTIVE_GEMINI_API_KEY && EFFECTIVE_GEMINI_API_KEY !== "YOUR_GEMINI_API_KEY_PLACEHOLDER") {
            try {
                genAI = new GoogleGenerativeAI(EFFECTIVE_GEMINI_API_KEY);
                model = genAI.getGenerativeModel({ model: "gemini-1.5-flash-latest" });
                document.getElementById('summarize-all-button').style.display = 'block';
                if (generateVideoButton) generateVideoButton.style.display = 'block';
            } catch (error) {
                console.error("Failed to initialize Gemini model:", formatErrorDetail(error.message || error));
                model = null;
            }
        } else {
            document.getElementById('summarize-all-button').style.display = 'none';
            if (generateVideoButton) generateVideoButton.style.display = 'none';
            console.warn("Gemini API Key not found or is a placeholder.");
            model = null;
        }

        function formatErrorDetail(detail) {
            if (typeof detail === 'string') return detail;
            if (typeof detail === 'object' && detail !== null) return JSON.stringify(detail);
            return '不明なエラー詳細';
        }

        async function fetchFeed(feedConfig) {
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedConfig.url)}`;
            const response = await fetch(apiUrl);
            if (!response.ok) {
                let errorText = response.statusText;
                try {
                    const errorData = await response.json();
                    if (errorData && errorData.message) errorText = formatErrorDetail(errorData.message);
                } catch (e) { /* ignore */ }
                throw new Error(`HTTP error! status: ${response.status}, message: ${errorText} for ${feedConfig.name}`);
            }
            const data = await response.json();
            if (data && data.status === 'ok' && Array.isArray(data.items)) {
                return data.items.map(item => ({ ...item, sourceName: feedConfig.name, sourceUrl: feedConfig.url }));
            } else if (data && data.status === 'error' && data.message) {
                throw new Error(`API error: ${formatErrorDetail(data.message)} for ${feedConfig.name}`);
            }
            throw new Error(`Invalid feed format for ${feedConfig.name}`);
        }

        async function generateGlobalSummary() {
            const summaryOutputContainer = document.getElementById('global-summary-output');
            summaryOutputContainer.style.display = 'block';
            ttsControlsDiv.style.display = 'block';
            ttsStatusElement.textContent = 'ニュース全体の要約を生成中...';
            summaryOutputContainer.innerHTML = `<p class="summary-loading">ニュース全体の要約を生成中...</p>`;

            if (!model) {
                summaryOutputContainer.innerHTML = `<p class="summary-error">Gemini APIキー未設定またはモデル初期化失敗。</p>`;
                ttsStatusElement.textContent = '要約機能は利用できません。';
                return;
            }
            if (currentNewsItemsForSummary.length === 0) {
                summaryOutputContainer.innerHTML = `<p class="summary-error">要約対象のニュースがありません。</p>`;
                ttsStatusElement.textContent = '要約対象のニュースがありません。';
                return;
            }

            let combinedNewsText = currentNewsItemsForSummary.map((item, index) => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = item.description;
                const plainDescription = (tempDiv.textContent || tempDiv.innerText || "").trim();
                return `ニュース ${index + 1}:\nタイトル: ${item.title}\n概要: ${plainDescription}\n出典: ${item.sourceName || '不明'}`;
            }).join("\n\n---\n\n");

            if (combinedNewsText.trim().length < 50) {
                summaryOutputContainer.innerHTML = `<p class="summary-error">要約するには情報が少なすぎます。</p>`;
                ttsStatusElement.textContent = '要約する情報が少なすぎます。';
                return;
            }

            try {
                const generationConfig = { temperature: 0.7, topK: 1, topP: 1, maxOutputTokens: 800 };
                const safetySettings = [
                    { category: HarmCategory.HARM_CATEGORY_HARASSMENT, threshold: HarmBlockThreshold.BLOCK_MEDIUM_AND_ABOVE },
                    { category: HarmCategory.HARM_CATEGORY_HATE_SPEECH, threshold: HarmBlockThreshold.BLOCK_MEDIUM_AND_ABOVE },
                    { category: HarmCategory.HARM_CATEGORY_SEXUALLY_EXPLICIT, threshold: HarmBlockThreshold.BLOCK_MEDIUM_AND_ABOVE },
                    { category: HarmCategory.HARM_CATEGORY_DANGEROUS_CONTENT, threshold: HarmBlockThreshold.BLOCK_MEDIUM_AND_ABOVE },
                ];
                const now = new Date();
                const timeString = now.toLocaleString('ja-JP', { hour: 'numeric', minute: 'numeric', timeZone: 'Asia/Tokyo', hour12: false });
                const currentHour = parseInt(now.toLocaleString('ja-JP', { hour: 'numeric', hour12: false, timeZone: 'Asia/Tokyo' }), 10);
                let greeting = (currentHour >= 5 && currentHour < 11) ? "おはようございます。" : (currentHour >= 11 && currentHour < 18) ? "こんにちは。" : "こんばんは。";
                const newsTimeString = `${timeString.replace(':', '時')}分`;
                const prompt = `まず「${greeting.slice(0, -1)}」と挨拶し、続けて「${newsTimeString}のニュースです。」と言ってください。\n\nその後、プロのニュースキャスターとして、以下の複数のニュース記事を元に、今日の出来事をレポートしてください。\n構成は以下のようにお願いします。\n\n1.  まず、最も重要な「メインニュース」を1つ選び、詳しく伝えてください。\n2.  次に、注目すべき「ヘッドラインニュース」を3つ程度選び、簡潔に伝えてください。\n3.  続いて、経済ニュースやその他の主要なニュースがあれば、いくつか選んで伝えてください。\n4.  もし、提供されたニュース記事の中にスポーツに関する情報があれば、その後にスポーツニュースとして伝えてください。情報がなければ、この項目は省略してください。「スポーツニュースはありません。」などとは表現せずに省略してください。\n5.  最後に、もし天気に関する情報があれば、気象情報として伝えてください。情報がなければ、この項目は省略してください。「気象情報はありません。」などとは表現せずに省略してください。\n6.  終わりには「ニュースのまとめ」を伝えて、番組を締めてください。\n\n各ニュースの要点を自然な話し言葉で、上記の順番で構成して話してください。\n\n[ニュース記事群ここから]\n${combinedNewsText}\n[ニュース記事群ここまで]`;
                const result = await model.generateContent({ contents: [{ role: "user", parts: [{text: prompt}] }], generationConfig, safetySettings });
                const summaryText = result.response.text();
                summaryOutputContainer.innerHTML = `<p>${summaryText.replace(/\n/g, '<br>')}</p>`;
                if (summaryText.trim()) speakSummary(summaryText.trim());
            } catch (error) {
                summaryOutputContainer.innerHTML = `<p class="summary-error">要約生成失敗: ${formatErrorDetail(error.message || error)}</p>`;
                ttsStatusElement.textContent = `要約生成失敗: ${formatErrorDetail(error.message || error)}`;
                console.error("Gemini API Error for global summary:", error);
            }
        }

        const synth = window.speechSynthesis;
        let japaneseVoice = null;

        function findJapaneseVoice() {
            if (!synth) return;
            const voices = synth.getVoices();
            const jaVoices = voices.filter(voice => voice.lang === 'ja-JP');
            const maleVoiceCandidates = [
                v => v.name.includes('Google') && (v.name.includes('Male') || v.name.includes('男性') || v.name.includes('男')),
                v => v.name.includes('Microsoft') && (v.name.includes('Male') || v.name.includes('男性') || v.name.includes('男') || v.name.includes('Hiroshi')),
                v => (v.name.includes('Male') || v.name.includes('男性') || v.name.includes('男') || v.name.includes('Otoya') || v.name.includes('Daichi'))
            ];
            let selectedVoice = null;
            for (const candidateFilter of maleVoiceCandidates) {
                selectedVoice = jaVoices.find(candidateFilter);
                if (selectedVoice) { japaneseVoice = selectedVoice; console.log("Selected Japanese voice:", japaneseVoice.name); return; }
            }
            selectedVoice = jaVoices.find(voice => voice.name.includes('Google')) || jaVoices.find(voice => voice.name.includes('Microsoft')) || jaVoices[0];
            if (selectedVoice) {
                japaneseVoice = selectedVoice;
                console.log("Selected Japanese voice (fallback):", japaneseVoice.name);
            } else {
                console.warn("No Japanese voice found.");
            }
        }

        if (synth) {
            if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = findJapaneseVoice;
            findJapaneseVoice();
        }

        async function speakSummary(textToSpeak) {
            if (!synth) {
                ttsStatusElement.textContent = '音声合成機能は利用できません。';
                ttsControlsDiv.style.display = 'block';
                return;
            }
            ttsControlsDiv.style.display = 'block';
            ttsStatusElement.textContent = '音声を生成中...';
            if (synth.speaking) synth.cancel();
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'ja-JP';
            if (japaneseVoice) utterance.voice = japaneseVoice;
            utterance.rate = 1.05;
            utterance.pitch = 1.0;
            utterance.onstart = () => { ttsStatusElement.textContent = '再生中...'; };
            utterance.onend = () => { ttsStatusElement.textContent = '音声の再生が終了しました。'; };
            utterance.onerror = (event) => { ttsStatusElement.textContent = `音声再生失敗: ${event.error}`; };
            synth.speak(utterance);
        }

        async function fetchAndDisplayNews() {
            newsFeedContainer.innerHTML = `<p class="loading">ニュースを読み込んでいます...</p>`;
            let allItems = [];
            const results = await Promise.allSettled(rssFeeds.map(fetchFeed));
            results.forEach(result => {
                if (result.status === 'fulfilled' && result.value) allItems = allItems.concat(result.value);
                else if (result.status === 'rejected') console.error(`フィード取得失敗: ${result.reason}`);
            });
            if (allItems.length === 0) {
                newsFeedContainer.innerHTML = `<p class="error">表示するニュースがありません。</p>`;
                return;
            }
            allItems.sort((a, b) => (new Date(b.pubDate || 0)) - (new Date(a.pubDate || 0)));
            const itemsToRender = allItems.slice(0, MAX_NEWS_ITEMS_TOTAL);
            currentNewsItemsForSummary = itemsToRender.map(item => ({ title: item.title, description: item.description, link: item.link, sourceName: item.sourceName }));
            renderNews(itemsToRender);
        }

        function renderNews(items) {
            if (!items || items.length === 0) {
                newsFeedContainer.innerHTML = "<p class='error'>表示するニュースがありません。</p>";
                return;
            }
            newsFeedContainer.innerHTML = '';
            items.forEach(item => {
                const newsItemDiv = document.createElement('div');
                newsItemDiv.classList.add('news-item');
                const titleElement = document.createElement('h2');
                const linkElement = document.createElement('a');
                linkElement.href = item.link;
                linkElement.textContent = item.title;
                linkElement.target = "_blank";
                linkElement.rel = "noopener noreferrer";
                titleElement.appendChild(linkElement);
                const descriptionElement = document.createElement('p');
                descriptionElement.classList.add('description');
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = item.description;
                let descriptionText = (tempDiv.textContent || tempDiv.innerText || "").trim();
                if (descriptionText.length > 120) descriptionText = descriptionText.substring(0, 120) + "...";
                descriptionElement.textContent = descriptionText;
                const dateElement = document.createElement('p');
                dateElement.classList.add('date');
                try {
                    if (item.pubDate) {
                        let dateObj = (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(item.pubDate) && !item.pubDate.includes('T') && !item.pubDate.match(/[A-Z]{3}$/i) && !item.pubDate.match(/[+-]\d{2}:?\d{2}$/))
                                      ? new Date(item.pubDate.replace(' ', 'T') + 'Z')
                                      : new Date(item.pubDate);
                        dateElement.textContent = `公開日: ${dateObj.toLocaleString('ja-JP', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Tokyo' })}`;
                    } else { dateElement.textContent = '公開日不明'; }
                } catch (e) { dateElement.textContent = item.pubDate ? `公開日: ${item.pubDate}` : '公開日不明'; }
                newsItemDiv.appendChild(titleElement);
                newsItemDiv.appendChild(descriptionElement);
                newsItemDiv.appendChild(dateElement);
                if (item.sourceName) {
                    const sourceElement = document.createElement('p');
                    sourceElement.classList.add('date');
                    sourceElement.style.cssText = 'font-size: 0.75em; color: #888; margin-top: 4px;';
                    const sourceLink = document.createElement('a');
                    sourceLink.href = item.sourceUrl || '#';
                    sourceLink.textContent = item.sourceName;
                    sourceLink.target = "_blank"; sourceLink.rel = "noopener noreferrer";
                    sourceElement.appendChild(document.createTextNode('出典: '));
                    sourceElement.appendChild(sourceLink);
                    newsItemDiv.appendChild(sourceElement);
                }
                newsFeedContainer.appendChild(newsItemDiv);
            });
        }

        fetchAndDisplayNews();
        document.getElementById('summarize-all-button').addEventListener('click', generateGlobalSummary);

        if (generateVideoButton && newsCanvas && videoOutputArea && videoLoadingIndicator) {
            newsCanvas.width = newsCanvas.parentElement.clientWidth > 854 ? 854 : newsCanvas.parentElement.clientWidth;
            newsCanvas.height = newsCanvas.width * (9/16);

            generateVideoButton.addEventListener('click', async () => {
                if (!newsCanvas.getContext) { alert("お使いのブラウザはCanvasをサポートしていません。"); return; }
                if (typeof MediaRecorder === 'undefined') { alert("お使いのブラウザはMediaRecorder APIをサポートしていません。"); return; }
                if (!window.speechSynthesis) { alert("お使いのブラウザは音声合成APIをサポートしていません。"); return; }
                if (currentNewsItemsForSummary.length === 0) { alert("動画に変換するニュースがありません。"); return; }

                const newsItemsForVideo = currentNewsItemsForSummary.slice(0, 5).map((item, index) => ({
                    title: item.title,
                    audioText: item.title,
                    // imageUrl: `images/news_image_${index}.png`,
                    backgroundImage: 'back.png', // ルートにある back.png を指定
                    slideDuration: 7000
                }));

                console.log("[Video Generation] Current japaneseVoice before creating videoOptions:", japaneseVoice ? japaneseVoice.name : "Not set");
                const videoOptions = {
                    opening: {
                        title: "", // オープニングタイトルを空にする
                        duration: 5000,
                        backgroundVideo:'op.mp4', // ルートにある op.mp4 を動画として指定
                        backgroundImage: 'op_fallback.png', // 例: op.mp4がダメな場合の静止画背景 (ファイル名を適宜変更してください)
                        backgroundColor: "#1a237e",
                        audioText: "本日の主要なニュースをお伝えします。"
                    },
                    defaultSlideDuration: 7000,
                    voice: japaneseVoice
                };
                if (!videoOptions.voice && window.speechSynthesis) { // フォールバックで音声を探す
                    videoOptions.voice = window.speechSynthesis.getVoices().find(v => v.lang === 'ja-JP' && (v.name.includes('Google') || v.name.includes('Male') || v.name.includes('男性')));
                    if (videoOptions.voice) {
                        console.log("Fallback: Selected Japanese voice for video:", videoOptions.voice.name);
                    } else { // フォールバックでも見つからなかった場合、さらに探す
                        console.warn("Fallback: No specific Japanese male/Google voice found for video. Trying any Japanese voice.");
                        videoOptions.voice = window.speechSynthesis.getVoices().find(v => v.lang === 'ja-JP');
                        if (videoOptions.voice) {
                            console.log("Fallback: Found any Japanese voice for video:", videoOptions.voice.name);
                        } else { // 該当のelseブロックのコメントアウトを解除
                            console.warn("Fallback: No Japanese voice found for video."); 
                        } // この閉じ括弧が、直前の else (L499) に対応します
                    } // この閉じ括弧が、L494の else に対応します
                }

                console.log("[Video Generation] videoOptions to be used:", JSON.parse(JSON.stringify(videoOptions, (key, value) => key === 'voice' && value instanceof SpeechSynthesisVoice ? {name: value.name, lang: value.lang, default: value.default} : value)));
                try {
                    generateVideoButton.disabled = true;
                    generateVideoButton.textContent = '動画生成中...';
                    videoLoadingIndicator.style.display = 'block'; // 読み込み中表示
                    newsCanvas.style.display = 'block';
                    videoOutputArea.innerHTML = '';
                    
                    await generateVideoFromNews(newsItemsForVideo, newsCanvas, videoOutputArea, videoOptions);
                } catch (error) {
                    console.error("動画生成中にエラーが発生しました:", error);
                    alert("動画生成中にエラーが発生しました: " + error.message);
                } finally {
                    generateVideoButton.disabled = false;
                    generateVideoButton.textContent = 'ニュース動画を生成 (β)';
                    videoLoadingIndicator.style.display = 'none'; // 読み込み中非表示
                    // newsCanvas.style.display = 'none'; // 生成後Canvasを非表示にする場合
                }
            });
        }
        
        

        const eewTickerContainer = document.getElementById('eew-ticker-container');
        const eewTickerText = document.getElementById('eew-ticker-text');
        const EEW_API_URL = 'https://api.wolfx.jp/jma_eew.json';
        let lastEEWData = null;
        const EEW_VALID_DURATION_MINUTES = 5;

        async function fetchEEWData() {
            try {
                const response = await fetch(EEW_API_URL);
                if (!response.ok) throw new Error(`EEW API error: ${response.status}`);
                const currentEEWData = await response.json();
                if (!currentEEWData || !currentEEWData.Title || !currentEEWData.EventID || !currentEEWData.AnnouncedTime) {
                    eewTickerContainer.style.display = 'none'; lastEEWData = null; return;
                }
                const announcedTime = new Date(currentEEWData.AnnouncedTime);
                if ((new Date().getTime() - announcedTime.getTime()) / 60000 > EEW_VALID_DURATION_MINUTES) {
                    eewTickerContainer.style.display = 'none'; lastEEWData = null; return;
                }
                const currentEventId = `${currentEEWData.EventID}-${currentEEWData.Serial}`;
                const lastEventId = lastEEWData ? `${lastEEWData.EventID}-${lastEEWData.Serial}` : null;
                if (currentEventId !== lastEventId) {
                    processEEWData(currentEEWData);
                    lastEEWData = currentEEWData;
                }
            } catch (error) {
                console.error('Failed to fetch EEW data:', error);
                eewTickerContainer.style.display = 'none'; lastEEWData = null;
            }
        }

        function processEEWData(eewData) {
            if (!eewData || eewData.isCancel || eewData.isTraining) {
                eewTickerContainer.style.display = 'none'; return;
            }
            let message = '', alertClass = '';
            if (eewData.isWarn) {
                message = `【緊急地震速報 - 警報】震源地: ${eewData.Hypocenter || '不明'}、深さ: 約${eewData.Depth ? eewData.Depth + 'km' : '不明'}、M${eewData.Magunitude || '不明'}。最大震度${eewData.MaxIntensity || '不明'}。強い揺れに警戒。`;
                alertClass = 'eew-alert-warning';
                speakEEWAlert(message);
            } else {
                message = `【緊急地震速報 - 予報】震源地: ${eewData.Hypocenter || '不明'}、M${eewData.Magunitude || '不明'}。`;
                alertClass = 'eew-alert-forecast';
            }
            eewTickerText.textContent = message;
            eewTickerContainer.className = '';
            if (alertClass) eewTickerContainer.classList.add(alertClass);
            eewTickerContainer.style.display = 'block';
            eewTickerText.style.animation = 'none'; eewTickerText.offsetHeight; eewTickerText.style.animation = null;
        }

        function speakEEWAlert(textToSpeak) {
            if (!synth) return;
            if (synth.speaking) synth.cancel();
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'ja-JP';
            if (japaneseVoice) utterance.voice = japaneseVoice;
            utterance.rate = 1.1; utterance.pitch = 1.0;
            utterance.onstart = () => eewTickerText.classList.add('paused');
            utterance.onend = () => eewTickerText.classList.remove('paused');
            utterance.onerror = () => eewTickerText.classList.remove('paused');
            synth.speak(utterance);
        }

        setInterval(fetchEEWData, 3000);
        fetchEEWData();
        window.addEventListener('beforeunload', () => { if (speechSynthesis && speechSynthesis.speaking) speechSynthesis.cancel(); });
    </script>
</body>
</html>
